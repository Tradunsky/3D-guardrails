services:
  app:
    build: .
    environment:
      - RUN_MODE=${RUN_MODE:-gradio}
      - DDDG_DUMP_SCREENSHOTS=True
    volumes:
      - .:/app
      # Using host network mode can cause port accessibility issues; switched to bridge mode with explicit port mapping
      # Expose container port 8000 to host
    network_mode: host
    # ports:
    #   - "8000:8000"
    #   - "7860:7860"
    develop:
      watch:
        - action: sync
          path: . ./src
          target: /app
          ignore:
            - .venv
            - .git
            - .idea
            - .vscode
            - .eggs
            - .cache
        - action: rebuild
          path: pyproject.toml uv.lock Dockerfile docker-compose.yaml
